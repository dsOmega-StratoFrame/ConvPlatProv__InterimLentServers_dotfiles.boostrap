---
- name: Add current user to docker group
  ansible.builtin.user:
    name: "{{ ansible_user_id }}"
    groups: docker
    append: yes
  notify: re-read docker group

- name: Ensure SSH key pair exists
  ansible.builtin.user:
    name: "{{ ansible_user_id }}"
    generate_ssh_key: yes
    ssh_key_file: "{{ bootstrap_ssh_private_key_file }}"