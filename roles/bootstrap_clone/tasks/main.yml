---
- name: Validate bootstrap_disk_device is set
  ansible.builtin.fail:
    msg: "Run lsblk command to check devices on remote and then please specify `bootstrap_disk_device` (e.g., /dev/sda) in group_vars or as extra variable."
  when: not bootstrap_disk_device or bootstrap_disk_device | length == 0

- name: Create temporary working directory
  delegate_to: localhost
  ansible.builtin.tempfile:
    state: directory
    suffix: nixos-xray
  register: workdir

- name: Clone repository
  delegate_to: localhost
  ansible.builtin.git:
    repo: "{{ bootstrap_repo_url }}"
    dest: "{{ workdir.path }}"
    version: "{{ bootstrap_repo_version }}"

- name: Update disk device in diskio.nix
  delegate_to: localhost
  ansible.builtin.replace:
    path: "{{ workdir.path }}/diskio.nix"
    regexp: 'device = "/dev/sda"'
    replace: 'device = "{{ bootstrap_disk_device }}"'
  when: bootstrap_disk_device != "/dev/sda"

- name: Store working directory path
  delegate_to: localhost
  ansible.builtin.set_fact:
    bootstrap_workdir: "{{ workdir.path }}"
