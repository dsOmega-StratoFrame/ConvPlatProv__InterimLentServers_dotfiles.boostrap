---
# If the ip address is provided, it will still return first entry - ip address.
- name: Get ip address corresponding to the hostname we're deploying to
  delegate_to: localhost
  ansible.builtin.getent:
    database: hosts
    key: "{{ inventory_hostname }}"
    fail_key: true

- name: Derive server ip
  delegate_to: localhost
  ansible.builtin.set_fact:
    bootstrap_server_ip: "{{ ansible_facts.getent_hosts.keys() | first }}"

- name: Debug address
  ansible.builtin.debug:
    msg: "Found address to deploy based on provided inventory hostname: {{ bootstrap_server_ip }}. It will be used in VLESS config"

- name: Derive server inner gateway ip
  delegate_to: localhost
  ansible.builtin.set_fact:
    # We're dividing our address space into many subnets inside bootstrap_server_mask_length subnet (gateway subnet).
    # Each subnet has mask with length 32 so basically each has only one ip. We get second subnet (index = 1), in other words getting second ip - gateway ip.
    bootstrap_server_gateway_ip: '{{ (bootstrap_server_ip + "/" + (bootstrap_server_mask_length | string)) | ansible.utils.ipsubnet(32, 1) }}'

- name: Debug gateway
  ansible.builtin.debug:
    msg: "Derived gateway address to configure based on provided inventory hostname: {{ bootstrap_server_gateway_ip }}. It will be used in VLESS config"

- name: Execute bootstrap script
  delegate_to: localhost
  ansible.builtin.shell:
    chdir: "{{ bootstrap_workdir }}"
    cmd: |
      set -o pipefail
      ./bootstrap.sh \
        --server-ip {{ bootstrap_server_ip }} \
        --gateway {{ bootstrap_server_gateway_ip }} \
        --auth-keys {{ bootstrap_ssh_private_key_file }}.pub \
        --root-auth-keys {{ bootstrap_ssh_private_key_file }}.pub \
        --priv-key {{ bootstrap_ssh_private_key_file }} \
        --clients {{ bootstrap_clients_count }} \
        --domain {{ bootstrap_reality_domain }} \
        {% if bootstrap_enable_nodeexporter %}--enable-nodeexporter true{% else %}--enable-nodeexporter false{% endif %} \
        2>&1 | tee /tmp/bootstrap_output.txt
  register: bootstrap_out
  changed_when: true

- name: Store bootstrap output
  delegate_to: localhost
  ansible.builtin.set_fact:
    bootstrap_output: "{{ lookup('file', '/tmp/bootstrap_output.txt') }}"
