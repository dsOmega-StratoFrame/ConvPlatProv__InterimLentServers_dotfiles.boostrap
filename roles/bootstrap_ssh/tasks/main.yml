---
- name: Print the host we're deploying to
  ansible.builtin.debug:
    msg: Configuring {{ inventory_hostname }}

- name: Upload SSH public key to VPS
  delegate_to: "{{ inventory_hostname }}"
  ansible.builtin.authorized_key:
    user: root
    state: present
    key: "{{ lookup('file', bootstrap_ssh_private_key_file + '.pub') }}"
  vars:
    ansible_user: root
    ansible_ssh_pass: "{{ bootstrap_vps_root_password }}"
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no"
  register: key_upload

