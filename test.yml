- name: Test work with ip addresses
  hosts: localhost
  #### examples
  # Ipsubnet filter plugin with different queries.
  vars:
    address: 192.168.144.20
    subnet_mask_length: 24
    subnet: 192.168.144.20/24
  tasks:
    - name: convert IP address to subnet
      debug:
        msg: '{{ address | ansible.utils.ipsubnet }}'
    # - name: check if a given string is a subnet
    #   debug:
    #     msg: '{{ subnet | ansible.utils.ipsubnet }}'
    # Here we're using 32 as mask, so we're basically operating on
    # a per-address basis.
    - name: Get the number of subnets a given subnet can be split into.
      debug:
        msg: '{{ subnet | ansible.utils.ipsubnet(32) }}'
    - name: Get a 1st subnet
      debug:
        msg: '{{ subnet | ansible.utils.ipsubnet(32, 0) }}'
    - name: Get a 2nd subnet
      debug:
        msg: '{{ subnet | ansible.utils.ipsubnet(32, 1) }}'
    - name: Get a last subnet
      debug:
        msg: '{{ subnet | ansible.utils.ipsubnet(20, -1) }}'
    - name: Get a 1st subnet only from address and subnet_mask_length
      debug:
        msg: '{{ (address + "/" + (subnet_mask_length | string)) | ansible.utils.ipsubnet(32, 1) }}'
