# Setting up main work projects
- name: Set up work projects
  hosts:
    - creamsoda
  roles:
    - role: repositories
      tags:
        - repositories

- name: Deploy VLESS via NixOS on MelisStoke
  hosts:
    - melisstoke
  roles:
    - role: bootstrap_prereqs
      tags: vless

    - role: bootstrap_ssh
      tags: vless

    - role: bootstrap_clone
      tags: vless

    - role: bootstrap_run
      tags: vless

    - role: bootstrap_links
      tags: vless
